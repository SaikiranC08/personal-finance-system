version: '3.9'

services:

  kong:
    image: kong:3.6

    container_name: kong

    environment:
      KONG_DATABASE: "off"

      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml

      KONG_PLUGINS: bundled,custom-auth

      KONG_LUA_PACKAGE_PATH: /opt/?.lua;;

      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout

      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr

      KONG_ADMIN_LISTEN: 0.0.0.0:8001

    volumes:
      - ./kong/kong.yml:/usr/local/kong/declarative/kong.yml
      - ./kong/plugins:/opt

    ports:
      - "${KONG_PROXY_PORT}:8000"
      - "${KONG_ADMIN_PORT}:8001"

    depends_on:
      auth-service:
        condition: service_started

      expense-service:
        condition: service_started

  mysql-auth:
    image: mysql:8.0

    container_name: mysql-auth

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_AUTH_DB}

    ports:
      - "3307:3306"

    volumes:
      - auth_mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-expense:
    image: mysql:8.0

    container_name: mysql-expense

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_EXPENSE_DB}
      FRONTEND_URL: ${FRONTEND_URL}

    ports:
      - "3308:3306"

    volumes:
      - expense_mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./auth-service

    container_name: auth-service

    environment:
      MYSQL_HOST: mysql-auth
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_AUTH_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}

    ports:
      - "${AUTH_PORT}:8080"

    depends_on:
      mysql-auth:
        condition: service_healthy

  expense-service:
    build:
      context: ./expense-service

    container_name: expense-service

    environment:
      MYSQL_HOST: mysql-expense
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_EXPENSE_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "${EXPENSE_PORT}:9898"

    depends_on:
      mysql-expense:
        condition: service_healthy

volumes:
  auth_mysql_data:
  expense_mysql_data: